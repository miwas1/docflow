global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: doc-platform-api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics

  - job_name: doc-platform-extractor
    static_configs:
      - targets: ["extractor:8001"]
    metrics_path: /metrics

  - job_name: doc-platform-classifier
    static_configs:
      - targets: ["classifier:8002"]
    metrics_path: /metrics
