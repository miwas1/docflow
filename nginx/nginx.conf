events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Increase buffer sizes for large API responses
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # -------------------------------------------------------------------------
    # Main API
    # All traffic on port 80 is proxied to the API service.
    # Internal admin UIs (RabbitMQ :15672, MinIO console :9001) are intentionally
    # kept on their own ports — add those ports to your EC2 security group for
    # your own IP only.
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Raise client body size to support document uploads (default is 1m)
        client_max_body_size 50M;

        # ---- Main API -------------------------------------------------------
        location / {
            proxy_pass         http://api:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        # ---- Dozzle log viewer ----------------------------------------------
        # Dozzle must be started with DOZZLE_BASE=/dozzle so it knows its
        # path prefix.  nginx forwards the full /dozzle/* path unchanged.
        location /dozzle {
            proxy_pass         http://dozzle:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            # SSE (Server-Sent Events) requires these settings
            proxy_set_header   Connection        "";
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
        }
    }
}
