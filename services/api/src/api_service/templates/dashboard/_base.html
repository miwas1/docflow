<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DocFlow — Dashboard</title>
  <style>
    :root {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --brand: #4f46e5; --brand-dark: #3730a3; --brand-light: #eef2ff;
      --text: #1e293b; --muted: #64748b; --border: #e2e8f0;
      --sidebar-w: 220px; --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f1f5f9; color: var(--text); display: flex; min-height: 100vh; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: #1e1b4b; color: #c7d2fe;
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto;
    }
    .sidebar-logo { padding: 24px 20px; font-size: 1.15rem; font-weight: 800;
                    color: #fff; text-decoration: none; letter-spacing: -.01em; }
    .sidebar-logo span { color: #a5b4fc; }
    .sidebar-nav { flex: 1; padding: 8px 0; }
    .nav-item { display: flex; align-items: center; gap: 10px;
                padding: 10px 20px; text-decoration: none; color: #a5b4fc;
                font-size: .9rem; transition: background .15s; border-radius: 0; }
    .nav-item:hover, .nav-item.active { background: rgba(255,255,255,.08); color: #fff; }
    .nav-item .icon { font-size: 1.1rem; width: 22px; text-align: center; }
    .sidebar-user { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,.1);
                    font-size: .85rem; color: #a5b4fc; }
    .sidebar-user strong { display: block; color: #fff; margin-bottom: 4px;
                           white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .btn-logout { background: rgba(255,255,255,.1); color: #c7d2fe; border: none;
                  padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: .8rem;
                  margin-top: 8px; width: 100%; }
    .btn-logout:hover { background: rgba(255,255,255,.2); color: #fff; }

    /* Main */
    .main { margin-left: var(--sidebar-w); flex: 1; display: flex; flex-direction: column; }
    .topbar { background: #fff; border-bottom: 1px solid var(--border);
              padding: 0 28px; height: 56px; display: flex; align-items: center;
              justify-content: space-between; position: sticky; top: 0; z-index: 50; }
    .topbar h1 { font-size: 1rem; font-weight: 600; }
    .content { padding: 28px; flex: 1; }

    /* Cards */
    .card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
            padding: 24px; box-shadow: 0 2px 8px rgba(15,23,42,.04); }
    .card h2 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; }

    /* Stats grid */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
             gap: 16px; margin-bottom: 24px; }
    .stat { background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
            padding: 20px 24px; }
    .stat-label { font-size: .8rem; color: var(--muted); font-weight: 500;
                  text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
    .stat-value { font-size: 2rem; font-weight: 700; }
    .stat-queued .stat-value { color: #0284c7; }
    .stat-running .stat-value { color: #7c3aed; }
    .stat-completed .stat-value { color: #16a34a; }
    .stat-failed .stat-value { color: #dc2626; }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: .875rem; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    th { font-weight: 600; font-size: .8rem; color: var(--muted);
         text-transform: uppercase; letter-spacing: .05em; background: #f8fafc; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafafa; }

    /* Badges */
    .badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: .75rem; font-weight: 600; }
    .badge-queued { background: #e0f2fe; color: #0369a1; }
    .badge-running { background: #ede9fe; color: #6d28d9; }
    .badge-completed { background: #dcfce7; color: #15803d; }
    .badge-failed { background: #fee2e2; color: #b91c1c; }

    /* Links */
    .link { color: var(--brand); text-decoration: none; font-weight: 500; }
    .link:hover { text-decoration: underline; }
    .muted { color: var(--muted); }

    /* Forms */
    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: .85rem; font-weight: 500; margin-bottom: 6px; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: .9rem; outline: none; }
    .field input:focus, .field select:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-light); }
    .btn { display: inline-block; padding: 9px 20px; border-radius: 8px; font-size: .875rem;
           font-weight: 500; cursor: pointer; text-decoration: none; border: none; background: #e2e8f0; }
    .btn-primary { background: var(--brand); color: #fff; }
    .btn-primary:hover { background: var(--brand-dark); }
    .btn-danger { background: #fee2e2; color: #b91c1c; }
    .btn-danger:hover { background: #fca5a5; }
    .btn-sm { padding: 5px 12px; font-size: .8rem; }

    /* Pills */
    .pill { display: inline-block; padding: 5px 14px; border-radius: 999px; font-size: .8rem;
            background: #f1f5f9; color: var(--muted); text-decoration: none; margin-right: 6px; }
    .pill-active { background: var(--brand-light); color: var(--brand); font-weight: 600; }
    .pill:hover { background: var(--brand-light); color: var(--brand); }

    /* Key reveal modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.4);
                     display: flex; align-items: center; justify-content: center; z-index: 200; }
    .modal { background: #fff; border-radius: 16px; padding: 36px 32px; max-width: 520px;
             width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
    .modal h2 { margin-bottom: 8px; }
    .modal .warning { color: #b45309; background: #fef3c7; border: 1px solid #fcd34d;
                      padding: 10px 14px; border-radius: 8px; font-size: .875rem; margin: 14px 0; }
    .key-reveal { background: #0f172a; color: #86efac; font-family: monospace;
                  padding: 16px; border-radius: 8px; font-size: .875rem;
                  word-break: break-all; margin-bottom: 20px; }
    .modal .btn + .btn { margin-left: 10px; }

    /* Error */
    .error { color: #b91c1c; }
    dl { display: grid; grid-template-columns: max-content 1fr; gap: 6px 16px; font-size: .9rem; }
    dt { font-weight: 600; color: var(--muted); }
  </style>
</head>
<body>

<aside class="sidebar">
  <a href="/dashboard/home" class="sidebar-logo">Doc<span>Flow</span></a>
  <nav class="sidebar-nav">
    <a href="/dashboard/home" class="nav-item {{active_home}}">
      <span class="icon">🏠</span> Home
    </a>
    <a href="/dashboard/api-keys" class="nav-item {{active_keys}}">
      <span class="icon">🔑</span> API Keys
    </a>
    <a href="/dashboard/webhooks" class="nav-item {{active_webhooks}}">
      <span class="icon">🔔</span> Webhooks
    </a>
    <a href="/dashboard/jobs" class="nav-item {{active_jobs}}">
      <span class="icon">📄</span> Jobs
    </a>
  </nav>
  <div class="sidebar-user">
    <strong>{{user_name}}</strong>
    <form method="post" action="/dashboard/logout">
      <button type="submit" class="btn-logout">Sign out</button>
    </form>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <h1>{{page_title}}</h1>
  </div>
  <div class="content">
    {{page_content}}
  </div>
</div>

</body>
</html>
