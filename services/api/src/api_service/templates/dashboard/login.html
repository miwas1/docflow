<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>DocFlow — Sign In</title>
  <style>
    :root { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --brand: #4f46e5; --brand-dark: #3730a3; --brand-light: #eef2ff;
            --text: #1e293b; --muted: #64748b; --border: #e2e8f0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f1f5f9; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; }
    .card { background: #fff; border: 1px solid var(--border); border-radius: 16px;
            padding: 40px 36px; width: 100%; max-width: 420px;
            box-shadow: 0 8px 32px rgba(15,23,42,.07); }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo a { font-size: 1.4rem; font-weight: 800; color: var(--brand); text-decoration: none; }
    h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 6px; }
    p.sub { color: var(--muted); font-size: .9rem; margin-bottom: 28px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: .85rem; font-weight: 500; margin-bottom: 6px; }
    input[type=email], input[type=password] {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--border);
      border-radius: 8px; font-size: .95rem; outline: none; }
    input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-light); }
    .btn { width: 100%; padding: 11px; background: var(--brand); color: #fff;
           border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
           cursor: pointer; margin-top: 6px; }
    .btn:hover { background: var(--brand-dark); }
    .footer-link { text-align: center; margin-top: 20px; font-size: .875rem; color: var(--muted); }
    .footer-link a { color: var(--brand); text-decoration: none; font-weight: 500; }
    .flash { padding: 10px 14px; border-radius: 8px; margin-bottom: 18px; font-size: .9rem; }
    .flash-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fca5a5; }
    .flash-success { background: #f0fdf4; color: #166534; border: 1px solid #86efac; }
  </style>
  <script>
    function getFlash() {
      const get = (n) => { const m = document.cookie.match('(?:^|;)\\s*' + n + '=([^;]*)'); return m ? decodeURIComponent(m[1]) : ''; };
      const msg = get('_flash_msg'), level = get('_flash_level') || 'error';
      if (msg) {
        const div = document.getElementById('flash');
        div.textContent = msg;
        div.className = 'flash flash-' + level;
        div.style.display = 'block';
        document.cookie = '_flash_msg=; Max-Age=0';
        document.cookie = '_flash_level=; Max-Age=0';
      }
    }
  </script>
</head>
<body onload="getFlash()">
  <div class="card">
    <div class="logo"><a href="/">DocFlow</a></div>
    <h1>Sign in to DocFlow</h1>
    <p class="sub">Welcome back. Enter your credentials to continue.</p>
    <div id="flash" style="display:none"></div>
    <form method="post" action="/dashboard/login">
      <div class="field">
        <label>Email address</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus />
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required />
      </div>
      <button type="submit" class="btn">Sign in</button>
    </form>
    <p class="footer-link">Don't have an account? <a href="/dashboard/signup">Sign up free</a></p>
  </div>
</body>
</html>
