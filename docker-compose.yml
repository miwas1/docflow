services:
  postgres:
    image: postgres:17
    container_name: doc-platform-postgres
    environment:
      POSTGRES_DB: doc_platform
      POSTGRES_USER: doc_platform
      POSTGRES_PASSWORD: doc_platform
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U doc_platform -d doc_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: doc-platform-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: doc_platform
      RABBITMQ_DEFAULT_PASS: doc_platform
      RABBITMQ_DEFAULT_VHOST: doc_platform
    ports:
      - "5672:5672"
      - "15672:15672"  # Management UI — restrict to your IP in the EC2 security group
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: doc-platform-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"  # Console UI — restrict to your IP in the EC2 security group
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    image: doc-platform-api:latest
    container_name: doc-platform-api
    env_file:
      - .env.example
    environment:
      POSTGRES_DSN: postgresql+psycopg://doc_platform:doc_platform@postgres:5432/doc_platform
      RABBITMQ_URL: amqp://doc_platform:doc_platform@rabbitmq:5672/doc_platform
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      SESSION_SECRET_KEY: dev-session-secret-change-me
      SESSION_EXPIRE_SECONDS: "2592000"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    image: doc-platform-orchestrator:latest
    container_name: doc-platform-orchestrator
    env_file:
      - .env.example
    environment:
      POSTGRES_DSN: postgresql+psycopg://doc_platform:doc_platform@postgres:5432/doc_platform
      RABBITMQ_URL: amqp://doc_platform:doc_platform@rabbitmq:5672/doc_platform
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      EXTRACTOR_BASE_URL: http://extractor:8001
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      extractor:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "from orchestrator_service.celery_app import celery_app; print(celery_app.main)"]
      interval: 15s
      timeout: 5s
      retries: 5

  extractor:
    build:
      context: .
      dockerfile: services/extractor/Dockerfile
    image: doc-platform-extractor:latest
    container_name: doc-platform-extractor
    env_file:
      - .env.example
    environment:
      RABBITMQ_URL: amqp://doc_platform:doc_platform@rabbitmq:5672/doc_platform
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
    ports:
      - "8001:8001"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/healthz').read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  classifier:
    build:
      context: .
      dockerfile: services/classifier/Dockerfile
    image: doc-platform-classifier:latest
    container_name: doc-platform-classifier
    env_file:
      - .env.example
    environment:
      RABBITMQ_URL: amqp://doc_platform:doc_platform@rabbitmq:5672/doc_platform
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
    ports:
      - "8002:8002"
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/healthz').read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Dozzle — real-time Docker log viewer, accessible at http://<host>/dozzle
  # ---------------------------------------------------------------------------
  dozzle:
    image: amir20/dozzle:latest
    container_name: doc-platform-dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_BASE: /dozzle
    # Port is intentionally not exposed externally; nginx proxies /dozzle traffic.
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ---------------------------------------------------------------------------
  # nginx — reverse proxy for EC2; exposes port 80 publicly
  # Routes:  /         → api:8000
  #          /dozzle/  → dozzle:8080
  # Admin UIs (RabbitMQ :15672, MinIO console :9001) stay on direct ports —
  # add those to your EC2 security group restricted to your own IP.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:stable-alpine
    container_name: doc-platform-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
      dozzle:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
